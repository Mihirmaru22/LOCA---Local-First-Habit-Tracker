name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Build & Unit Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List available Xcode installations
        run: ls /Applications | grep -i xcode || echo "No Xcode found in /Applications"

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.3.app 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_16.2.app 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_16.1.app 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_16.0.app 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_16.app 2>/dev/null \
            || echo "WARNING: No Xcode 16 found; using system default"
          xcodebuild -version
          swift --version

      - name: Pick an available iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c 'import json,sys; data=json.load(sys.stdin)["devices"]; ids=[d["udid"] for rt in sorted(data,reverse=True) for d in data[rt] if d.get("isAvailable") and "iPhone" in d.get("name","")]; print(ids[0] if ids else "")')
          if [ -z "$UDID" ]; then
            echo "ERROR: No available iPhone simulator found."
            xcrun simctl list devices
            exit 1
          fi
          echo "Using simulator: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project LOCA.xcodeproj \
            -scheme LOCA \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee xcodebuild.log

      - name: Upload result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
          if-no-files-found: ignore

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: ignore
